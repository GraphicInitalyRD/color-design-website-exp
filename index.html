<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Design Website Exp</title>
<link rel="stylesheet" href="site.css">
<style>
/* ====== HERO: parentesi vettoriali ESATTE + finestra immagine ====== */
  .hero{
    position:relative;
    width:100%;
    aspect-ratio:390 / 205.2;   /* stesse proporzioni del PDF */
    background:var(--hero-bg);
    overflow:hidden;
  }
/* finestra immagine: coordinate esatte del PDF (rettangolo 54.4->330.7 / 37->233.7) */
  .window{
    position:absolute;
    left:13.94%; right:15.21%; top:2.14%; bottom:2.0%;
    overflow:hidden;
  }
.hero-img{ width:100%; height:100%; object-fit:cover; display:block; }
/* ===== FASCIA CAROSELLO: un riquadro alla volta, automatico, infinito ===== */
  .promo{ background:var(--hero-bg); padding:18px 0 20px; overflow:hidden; }
.promo-viewport{ overflow:hidden; width:100%; }
.promo-track{ display:flex; }
.promo-slide{ flex:0 0 100%; aspect-ratio:225 / 255; }
/* proporzione delle pagine A4 orizzontali */
  .promo-slide .card{ width:100%; height:100%; object-fit:cover; display:block; }
/* le due parentesi bianche, vettoriali esatte dal PDF */
  .crescents{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
/* logo vettoriale ESATTO dal PDF: centrale e fisso, sopra le immagini */
  .hero-logo{ position:absolute; left:50%; bottom:3.4%; width:34%; transform:translateX(-50%); pointer-events:none; }
.hero-logo .brand-logo{ display:block; width:100%; height:auto; filter:drop-shadow(0 1px 5px rgba(0,0,0,.35)); }
  /* ===== animazione sincronizzata col cambio immagine del carosello ===== */
  .crescents .cres-l, .crescents .cres-r{ transform-box: fill-box; }
  .hero.pulse .cres-l{ animation: cresL .85s ease; }
  .hero.pulse .cres-r{ animation: cresR .85s ease; }
  .hero.pulse .brand-logo{ animation: logoPulse .85s ease; }
  @keyframes cresL{ 0%,100%{ transform:translateX(0); } 45%{ transform:translateX(-13px); } }
  @keyframes cresR{ 0%,100%{ transform:translateX(0); } 45%{ transform:translateX(13px); } }
  @keyframes logoPulse{ 0%,100%{ transform:scale(1); } 45%{ transform:scale(1.4); } }
</style>
</head>

    <script src="site.js"></script>
  <script>
    /* fascia carosello: un riquadro alla volta, entra -> fermo ~2s -> scorre al successivo, infinito */
    (function(){
      var hero = document.querySelector('.hero');
      function pulseHero(){
        if(!hero) return;
        hero.classList.remove('pulse');
        void hero.offsetWidth;          // forza il riavvio dell'animazione
        hero.classList.add('pulse');
      }
      // ogni fascia .promo-track scorre in modo indipendente, un riquadro alla volta, loop infinito
      document.querySelectorAll('.promo-track').forEach(function(track){
        var n = track.children.length;
        track.appendChild(track.children[0].cloneNode(true)); // clone per loop continuo
        var i = 0;
        setInterval(function(){
          i++;
          track.style.transition = 'transform .6s ease';
          track.style.transform  = 'translateX(-' + (i*100) + '%)';
          pulseHero();                   // parentesi si allargano + logo pulsa, in sync col cambio
          if(i === n){
            setTimeout(function(){
              track.style.transition = 'none';
              i = 0;
              track.style.transform = 'translateX(0)';
            }, 650);
          }
        }, 2000); // scorrimento ogni 2 secondi
      });
    })();
  </script>

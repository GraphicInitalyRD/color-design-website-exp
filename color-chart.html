<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Chart - Color Design</title>
<style>
  /* ====== VARIABILI: colori presi ESATTI dal tuo PDF ====== */
  :root{
    --nav-bg:      #29292a;   /* barra scura in alto */
    --hero-bg:     #404042;   /* sfondo hero dietro le parentesi */
    --lens-white:  #ffffff;   /* forme bianche (parentesi) */
    --footer-bg:   #29292a;   /* striscia scura attorno al footer */
    --footer-card: #707374;   /* card grigia del footer */
    --text-white:  #ffffff;
    --btn-border:  #ffffff;
    --font-main: "Helvetica Neue", Arial, sans-serif;
    --page-width: 390px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:var(--footer-bg); }
  body{ font-family:var(--font-main); color:var(--text-white); -webkit-font-smoothing:antialiased; }

  .page{ width:100%; max-width:var(--page-width); margin:0 auto; background:var(--hero-bg); position:relative; }

  /* ====== BARRA + MENU A PANINO ====== */
  .topbar{
    background:var(--nav-bg);
    height:48px;
    display:flex;
    align-items:center;
    padding:0 12px;
    position:relative;
    z-index:20;
  }
  .hamburger{
    width:34px; height:34px;
    display:flex; flex-direction:column; justify-content:center; gap:5px;
    background:none; border:none; cursor:pointer; padding:4px;
  }
  .hamburger span{ display:block; height:3px; background:var(--text-white); border-radius:2px; transition:.25s; }
  /* animazione in "X" quando aperto */
  .topbar.open .hamburger span:nth-child(1){ transform:translateY(8px) rotate(45deg); }
  .topbar.open .hamburger span:nth-child(2){ opacity:0; }
  .topbar.open .hamburger span:nth-child(3){ transform:translateY(-8px) rotate(-45deg); }

  .topbar-logo{ height:30px; width:auto; margin-left:14px; display:block; }

  /* pannello a tendina con i 6 pulsanti */
  .menu{
    position:absolute;
    top:48px; left:0;
    width:100%;
    background:var(--nav-bg);
    display:grid;
    gap:8px;
    padding:0 12px;
    max-height:0; overflow:hidden;
    transition:max-height .3s ease, padding .3s ease;
    z-index:19;
  }
  .topbar.open + .menu{ max-height:420px; padding:12px; }
  .menu a{
    display:block;
    color:var(--text-white);
    text-decoration:none;
    border:1px solid var(--btn-border);
    border-radius:3px;
    padding:12px 14px;
    font-size:13px;
    letter-spacing:.6px;
    text-transform:uppercase;
    transition:background .15s ease;
  }
  .menu a:hover, .menu a.active{ background:#3a3a3c; }

  /* ====== HERO: parentesi vettoriali ESATTE + finestra immagine ====== */
  .hero{
    position:relative;
    width:100%;
    aspect-ratio:390 / 205.2;   /* stesse proporzioni del PDF */
    background:var(--hero-bg);
    overflow:hidden;
  }
  /* finestra immagine: coordinate esatte del PDF (rettangolo 54.4->330.7 / 37->233.7) */
  .window{
    position:absolute;
    left:13.94%; right:15.21%; top:2.14%; bottom:2.0%;
    overflow:hidden;
  }
  .hero-img{ width:100%; height:100%; object-fit:cover; display:block; }

  /* ===== FASCIA CAROSELLO: un riquadro alla volta, automatico, infinito ===== */
  .promo{ background:var(--hero-bg); padding:18px 0 20px; overflow:hidden; }
  .promo-viewport{ overflow:hidden; width:100%; }
  .promo-track{ display:flex; }
  .promo-slide{ flex:0 0 100%; aspect-ratio:841.89 / 595.276; }   /* proporzione delle pagine A4 orizzontali */
  .promo-slide .card{ width:100%; height:100%; object-fit:cover; display:block; }

  /* le due parentesi bianche, vettoriali esatte dal PDF */
  .crescents{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  /* logo vettoriale ESATTO dal PDF: centrale e fisso, sopra le immagini */
  .hero-logo{ position:absolute; left:50%; bottom:3.4%; width:34%; transform:translateX(-50%); pointer-events:none; }
  .hero-logo .brand-logo{ display:block; width:100%; height:auto; filter:drop-shadow(0 1px 5px rgba(0,0,0,.35)); }

  /* ====== FOOTER ====== */
  footer{ background:var(--footer-bg); padding:16px 12px 22px; }
  .footer-card{ background:var(--footer-card); border-radius:4px; padding:16px 14px 18px; text-align:center; }
  .footer-card .addr{ font-size:12px; line-height:1.5; }
  .footer-card .addr b{ font-weight:700; }
  .footer-card .made{ font-weight:700; font-size:13px; margin:12px 0; letter-spacing:.5px; }
  .footer-card a.flink{ display:block; color:var(--text-white); text-decoration:none; font-weight:700; font-size:13px; letter-spacing:.5px; margin:12px 0; }
  .footer-card a.flink:hover{ text-decoration:underline; }

  /* ===== contenuto pagina Color Chart ===== */
  .cc-main{ background:#ffffff; }
  .cc-img{ display:block; width:100%; height:auto; }
</style>
</head>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brochures - Color Design</title>
<link rel="stylesheet" href="site.css">
<style>
  /* ===== pagina Brochures: parentesi come la home + link ai PDF al centro ===== */
  .hero{ position:relative; width:100%; aspect-ratio:390 / 205.2; background:var(--hero-bg); overflow:hidden; }
  .crescents{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  /* i tre nomi dei PDF, incolonnati e centrati nella "lente" fra le parentesi */
  .brochure-links{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:13px; text-align:center; padding:0 15%;
  }
  .brochure-links a{
    color:var(--text-white); text-decoration:none;
    font-size:12px; letter-spacing:.3px; line-height:1.25;
    display:block; max-width:100%;
    transition:opacity .15s ease;
  }
  .brochure-links a:hover{ text-decoration:underline; }
  .brochure-links .dl{ font-size:11px; opacity:.85; margin-left:4px; }
  .brochure-links .lang{ font-size:8px; letter-spacing:2px; text-transform:uppercase; opacity:.65; display:block; margin-bottom:2px; }
</style>
</head>
<body>
  <div class="page">

    <div id="site-header" data-title="DOWNLOAD OUR BROCHURES" data-active="brochures"></div>

    <section class="hero">

        <path fill="var(--lens-white)" d="M 297.542969 42.980469 L 291.386719 32.613281 L 346.597656 32.613281 C 359.902344 57.683594 368.335938 83.589844 371.703125 109.785156 C 374.804688 133.90625 373.628906 158.234375 368.203125 182.09375 C 362.527344 207.054688 353.308594 226.351562 346.835938 237.808594 L 288.300781 237.808594 L 299.09375 224.507812 C 299.875 223.484375 314.621094 203.78125 321.734375 172.269531 C 325.933594 153.667969 326.710938 134.539062 324.039062 115.40625 C 320.667969 91.273438 311.753906 66.90625 297.542969 42.980469"/>

      <div class="brochure-links">
        <a href="colordesign-brochure-eng.pdf" download><span class="lang">English</span>COLORDESIGN Products Presentation<span class="dl">&#8681;</span></a>
        <a href="colordesign-brochure-ita.pdf" download><span class="lang">Italiano</span>COLORDESIGN Presentazione Prodotti<span class="dl">&#8681;</span></a>

    </section>

    <div id="site-footer"></div>

  </div>

  <script src="site.js"></script>
